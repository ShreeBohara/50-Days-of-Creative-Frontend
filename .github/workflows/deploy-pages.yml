name: Deploy Creative Frontend Gallery

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "site.css"
      - "day-01-particle-text/**"
      - "day-02-liquid-glass-card/**"
      - ".github/workflows/deploy-pages.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Stage static site bundle
        run: |
          mkdir -p _site
          cp index.html site.css _site/
          cp -R day-01-particle-text _site/
          cp -R day-02-liquid-glass-card _site/

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
