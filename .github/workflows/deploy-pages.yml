name: Deploy Creative Frontend Gallery

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "site.css"
      - "day-01-particle-text/**"
      - "day-02-liquid-glass-card/**"
      - "day-03-solar-system/**"
      - "day-04-audio-visualizer/**"
      - "day-05-terrain-generator/**"
      - "day-06-matrix-rain/**"
      - "day-07-fluid-sim/**"
      - "day-08-flow-field/**"
      - "day-09-masonry-gallery/**"
      - ".github/workflows/deploy-pages.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: day-03-solar-system/package-lock.json

      - name: Install Day 03 app dependencies
        working-directory: day-03-solar-system
        run: npm ci

      - name: Build Day 03 app
        working-directory: day-03-solar-system
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Stage static site bundle
        run: |
          mkdir -p _site
          cp index.html site.css _site/
          cp -R day-01-particle-text _site/
          cp -R day-02-liquid-glass-card _site/
          cp -R day-04-audio-visualizer _site/
          cp -R day-05-terrain-generator _site/
          cp -R day-06-matrix-rain _site/
          cp -R day-07-fluid-sim _site/
          cp -R day-08-flow-field _site/
          cp -R day-09-masonry-gallery _site/
          mkdir -p _site/day-03-solar-system
          cp -R day-03-solar-system/dist/. _site/day-03-solar-system/

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
