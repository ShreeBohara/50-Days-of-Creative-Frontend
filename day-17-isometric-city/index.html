<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Day 17 — Isometric City Builder with day/night cycle, minimap, and procedural generation."
    />
    <meta name="theme-color" content="#0b1120" />
    <title>Day 17 | Isometric City Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&family=Azeret+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-panel" aria-label="Isometric city builder introduction">
        <p class="hero-panel__eyebrow">Day 17 / 50</p>
        <h1>Isometric City Builder</h1>
        <p class="hero-panel__lede">
          Place buildings, roads, and parks on a charming isometric grid. Toggle day and night to watch your city glow.
        </p>
      </section>

      <section class="canvas-wrap">
        <canvas id="city-canvas"></canvas>
      </section>

      <nav class="toolbar" aria-label="Tile palette">
        <div class="toolbar__tiles">
          <button class="tool-btn active" data-tile="grass" aria-label="Grass">
            <span class="tool-preview tool-preview--grass"></span>
            <span class="tool-label">Grass</span>
          </button>
          <button class="tool-btn" data-tile="road" aria-label="Road">
            <span class="tool-preview tool-preview--road"></span>
            <span class="tool-label">Road</span>
          </button>
          <button class="tool-btn" data-tile="water" aria-label="Water">
            <span class="tool-preview tool-preview--water"></span>
            <span class="tool-label">Water</span>
          </button>
          <button class="tool-btn" data-tile="park" aria-label="Park">
            <span class="tool-preview tool-preview--park"></span>
            <span class="tool-label">Park</span>
          </button>
          <button class="tool-btn" data-tile="tree" aria-label="Tree">
            <span class="tool-preview tool-preview--tree"></span>
            <span class="tool-label">Tree</span>
          </button>
          <button class="tool-btn" data-tile="building-small" aria-label="Small building">
            <span class="tool-preview tool-preview--building-small"></span>
            <span class="tool-label">Small</span>
          </button>
          <button class="tool-btn" data-tile="building-tall" aria-label="Tall building">
            <span class="tool-preview tool-preview--building-tall"></span>
            <span class="tool-label">Tall</span>
          </button>
          <button class="tool-btn" data-tile="building-skyscraper" aria-label="Skyscraper">
            <span class="tool-preview tool-preview--building-skyscraper"></span>
            <span class="tool-label">Tower</span>
          </button>
        </div>

        <div class="toolbar__divider"></div>

        <div class="toolbar__actions">
          <button class="action-btn" data-action="clear">Clear All</button>
          <button class="action-btn" data-action="random">Random City</button>
          <button class="action-btn action-btn--icon" data-action="daynight" aria-label="Toggle day/night">
            <span class="daynight-icon" aria-hidden="true"></span>
          </button>
        </div>
      </nav>

      <noscript class="no-script">This experiment needs JavaScript enabled.</noscript>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
