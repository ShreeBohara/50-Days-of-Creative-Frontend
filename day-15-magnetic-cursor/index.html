<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Day 15 — Magnetic Cursor Trail. A spring-driven particle field that chases the pointer."
    />
    <meta name="theme-color" content="#070b16" />
    <title>Day 15 | Magnetic Cursor Trail</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Sora:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <canvas class="scene" data-scene aria-hidden="true"></canvas>

      <section class="hud" aria-label="Magnetic cursor trail controls">
        <div class="hud__copy">
          <p class="hud__eyebrow">Day 15 / 50</p>
          <h1>Magnetic Cursor Trail</h1>
          <p class="hud__lede">
            Sweep the pointer to stretch the chain, pause to let it orbit, and click to break the formation.
          </p>
        </div>

        <div class="hud__controls">
          <label class="toggle" for="trail-mode">
            <span>Trail mode</span>
            <input id="trail-mode" data-trail-toggle type="checkbox" />
            <span class="toggle__ui" aria-hidden="true"></span>
          </label>
          <p class="hud__hint">Single click explodes. Double click scatters to the edges.</p>
        </div>
      </section>

      <noscript class="no-script">This experiment needs JavaScript enabled.</noscript>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
