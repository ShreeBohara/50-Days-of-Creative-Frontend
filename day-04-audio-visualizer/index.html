<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 04 | Audio Visualizer Spectrum</title>
    <meta
      name="description"
      content="A circular audio spectrum visualizer with radial frequency bars, beat-reactive motion, and a built-in demo mode."
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="visualizer-page">
      <canvas class="visualizer-canvas" data-spectrum-canvas aria-label="Circular audio spectrum visualizer"></canvas>

      <!-- Massive title watermark behind visualization -->
      <div class="title-watermark" aria-hidden="true">
        <span>CIRCULAR</span>
        <span>AUDIO</span>
        <span>SPECTRUM</span>
      </div>

      <!-- Corner marker -->
      <div class="corner-mark" aria-hidden="true">04/50</div>

      <!-- Transport bar at bottom -->
      <div class="transport-bar" data-transport-bar>
        <label class="transport-upload" for="audio-upload">
          <span>UPLOAD</span>
          <input
            id="audio-upload"
            type="file"
            accept=".mp3,.wav,audio/mpeg,audio/wav,audio/wave,audio/x-wav,audio/*"
            data-audio-input
          />
        </label>

        <button type="button" class="transport-play" data-play-toggle aria-pressed="false">
          PLAY DEMO
        </button>

        <div class="transport-status" aria-live="polite">
          <span class="status-dot" data-status-dot></span>
          <p class="status-text" data-status-label>READY</p>
        </div>

        <p class="transport-track" data-track-label>NO FILE — DEMO AVAILABLE</p>
      </div>

      <audio data-audio-element preload="metadata" hidden></audio>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
