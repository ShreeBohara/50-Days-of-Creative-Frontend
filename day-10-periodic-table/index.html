<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive periodic table with 118 elements, category colors, search, temperature slider, and detailed element modals"
    />
    <meta name="theme-color" content="#0a0a0f" />
    <title>Day 10 | Periodic Table</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Outfit:wght@300;400;500;600&family=Oxanium:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app" data-app>
      <!-- Controls header -->
      <header class="controls" data-controls>
        <div class="controls-left">
          <p class="eyebrow">Day 10 / Creative Frontend</p>
          <h1 class="title">Periodic Table</h1>
        </div>
        <div class="controls-right">
          <div class="search-wrap">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="14.5" y2="14.5"/>
            </svg>
            <input type="text" class="search-input" data-search placeholder="Search elements..." autocomplete="off" spellcheck="false" />
            <button class="search-clear" data-search-clear aria-label="Clear search" hidden>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <!-- Category filters -->
      <div class="category-filters" data-category-filters>
        <button class="cat-btn active" data-cat="all">All</button>
        <button class="cat-btn" data-cat="alkali-metal" style="--btn-color: var(--cat-alkali-metal)">Alkali</button>
        <button class="cat-btn" data-cat="alkaline-earth" style="--btn-color: var(--cat-alkaline-earth)">Alkaline</button>
        <button class="cat-btn" data-cat="transition-metal" style="--btn-color: var(--cat-transition-metal)">Transition</button>
        <button class="cat-btn" data-cat="post-transition" style="--btn-color: var(--cat-post-transition)">Post-Trans</button>
        <button class="cat-btn" data-cat="metalloid" style="--btn-color: var(--cat-metalloid)">Metalloid</button>
        <button class="cat-btn" data-cat="nonmetal" style="--btn-color: var(--cat-nonmetal)">Nonmetal</button>
        <button class="cat-btn" data-cat="halogen" style="--btn-color: var(--cat-halogen)">Halogen</button>
        <button class="cat-btn" data-cat="noble-gas" style="--btn-color: var(--cat-noble-gas)">Noble Gas</button>
        <button class="cat-btn" data-cat="lanthanide" style="--btn-color: var(--cat-lanthanide)">Lanthanide</button>
        <button class="cat-btn" data-cat="actinide" style="--btn-color: var(--cat-actinide)">Actinide</button>
      </div>

      <!-- Table area -->
      <main class="table-wrapper" data-table-wrapper>
        <div class="periodic-table" data-table></div>
      </main>

      <!-- Modal overlay -->
      <div class="modal-overlay" data-modal aria-hidden="true">
        <div class="modal-backdrop" data-modal-backdrop></div>
        <div class="modal-card" data-modal-card>
          <button class="modal-close" data-modal-close aria-label="Close modal">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="4" y1="4" x2="16" y2="16"/><line x1="16" y1="4" x2="4" y2="16"/>
            </svg>
          </button>
          <div class="modal-accent" data-modal-accent></div>
          <div class="modal-header" data-modal-header></div>
          <div class="modal-body" data-modal-body></div>
        </div>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
