<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A premium 3D card deck with cinematic transitions — fan, shuffle, flip through ten Celestial Arcana cards"
    />
    <meta name="theme-color" content="#0a0a0f" />
    <title>Day 12 | 3D Card Deck</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app" data-app>

      <!-- Corner label -->
      <div class="corner-label" aria-hidden="true">12 / 50</div>

      <!-- Header -->
      <header class="deck-header">
        <h1>Celestial Arcana</h1>
        <p class="deck-subtitle">Ten cards of the cosmic order</p>
      </header>

      <!-- 3D Stage -->
      <main class="deck-stage" data-deck-stage aria-label="3D card deck">
        <div class="deck" data-deck></div>
      </main>

      <!-- Controls -->
      <div class="controls" data-controls>
        <button class="controls__btn" data-btn-fan type="button">Fan</button>
        <button class="controls__btn" data-btn-stack type="button">Stack</button>
        <button class="controls__btn" data-btn-shuffle type="button">Shuffle</button>
      </div>

    </div>
    <script src="./script.js"></script>
  </body>
</html>
