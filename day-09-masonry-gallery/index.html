<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Infinite scroll masonry gallery with lightbox, powered by Intersection Observer and picsum.photos"
    />
    <meta name="theme-color" content="#0a0a0f" />
    <title>Day 09 | Masonry Gallery</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="gallery-app" data-app>
      <!-- Sticky header -->
      <header class="site-header" data-header>
        <div class="header-left">
          <p class="eyebrow">Day 09 / Creative Frontend</p>
          <h1 class="header-title" data-scroll-top>Gallery</h1>
        </div>
        <div class="header-center">
          <span class="image-counter" data-counter>0 images</span>
        </div>
        <div class="header-right">
          <div class="col-toggle" data-col-toggle role="group" aria-label="Column count">
            <button data-col="2" class="col-btn" aria-label="2 columns">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <rect x="1" y="1" width="6.5" height="16" rx="1.5"/>
                <rect x="10.5" y="1" width="6.5" height="16" rx="1.5"/>
              </svg>
            </button>
            <button data-col="3" class="col-btn" aria-label="3 columns">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <rect x="1" y="1" width="4" height="16" rx="1.5"/>
                <rect x="7" y="1" width="4" height="16" rx="1.5"/>
                <rect x="13" y="1" width="4" height="16" rx="1.5"/>
              </svg>
            </button>
            <button data-col="4" class="col-btn active" aria-label="4 columns">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <rect x="1" y="1" width="2.75" height="16" rx="1"/>
                <rect x="5.75" y="1" width="2.75" height="16" rx="1"/>
                <rect x="10.5" y="1" width="2.75" height="16" rx="1"/>
                <rect x="15.25" y="1" width="2.75" height="16" rx="1"/>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <!-- Main gallery area -->
      <main class="gallery-main" data-gallery-main>
        <div class="masonry" data-masonry></div>
        <div class="scroll-sentinel" data-sentinel aria-hidden="true"></div>
        <div class="loader" data-loader aria-label="Loading more images">
          <div class="loader-skeleton">
            <div class="loader-bone"></div>
            <div class="loader-bone"></div>
            <div class="loader-bone"></div>
            <div class="loader-bone"></div>
          </div>
        </div>
      </main>

      <!-- Lightbox overlay -->
      <div class="lightbox" data-lightbox aria-hidden="true" role="dialog" aria-label="Image viewer">
        <div class="lightbox-backdrop" data-lightbox-backdrop></div>
        <div class="lightbox-content" data-lightbox-content>
          <button class="lightbox-close" data-lightbox-close aria-label="Close">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
          <button class="lightbox-nav lightbox-prev" data-lightbox-prev aria-label="Previous image">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <div class="lightbox-image-wrap">
            <img class="lightbox-img" data-lightbox-img src="" alt="" />
          </div>
          <button class="lightbox-nav lightbox-next" data-lightbox-next aria-label="Next image">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
          <div class="lightbox-footer">
            <span class="lightbox-author" data-lightbox-author></span>
            <span class="lightbox-counter" data-lightbox-counter></span>
          </div>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
