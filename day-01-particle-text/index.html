<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 01 | Particle Text Morphing</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif:ital@1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <canvas class="particle-canvas" data-particle-canvas aria-hidden="true"></canvas>

      <!-- Corner frame marker -->
      <div class="frame-marker" aria-hidden="true"><span>01/50</span></div>

      <!-- Coordinate readout -->
      <div class="coord-readout" data-coord-readout aria-hidden="true">x: 0 y: 0</div>

      <!-- Control panel -->
      <section class="ui-panel" aria-label="Particle text controls">
        <h1>Particle Text</h1>

        <form class="word-form" data-word-form>
          <label class="sr-only" for="word-input">Enter a word to morph on the canvas</label>
          <input
            id="word-input"
            class="word-input"
            data-word-input
            type="text"
            maxlength="18"
            autocomplete="off"
            spellcheck="false"
            placeholder="TYPE HERE_"
          />
        </form>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
